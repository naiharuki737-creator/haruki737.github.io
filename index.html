<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Snake Game Ranking</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="start">

<h1>🐍 Snake Game</h1>

<p>最高のスネークプレイヤーを目指せ！</p>

<select id="level">
<option value="150">かんたん</option>
<option value="100" selected>ふつう</option>
<option value="60">むずかしい</option>
</select>

<br><br>

<button onclick="startGame()">START</button>

<p>最高スコア：<span id="best">0</span></p>

</div>

<canvas id="game" width="400" height="400" style="display:none;"></canvas>

<h2>
スコア：
<span id="score">0</span>
</h2>

<h2>🏆 オンラインランキング</h2>

<ol id="ranking">
読み込み中...
</ol>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =
"https://moflhzgviqckxertkqce.supabase.co";

const supabaseKey =
"ここにPublishable Keyを貼る";

const db = supabase.createClient(
supabaseUrl,
supabaseKey
);

async function saveScore(score){

let name = localStorage.getItem("playerName");

if(!name){

name = prompt("名前を入力してください");

if(!name){
name="名無し";
}

localStorage.setItem("playerName",name);

}

const { error } = await db
.from("ranking")
.insert([
{
name:name,
score:score
}
]);

if(error){
console.log(error);
return;
}

loadRanking();

}

async function loadRanking(){

const { data, error } = await db
.from("ranking")
.select("*")
.order("score",{ascending:false})
.limit(10);

if(error){
console.log(error);
document.getElementById("ranking").innerHTML="ランキング読み込み失敗";
return;
}

const list=document.getElementById("ranking");
list.innerHTML="";

data.forEach((player,index)=>{

const li=document.createElement("li");
li.textContent=(index+1)+"位 "+player.name+" : "+player.score;
list.appendChild(li);

});

}

loadRanking();
</script>

<script src="script.js"></script>

</body>
</html>
