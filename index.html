<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl =
"https://moflhzgviqckxertkqce.supabase.co";


const supabaseKey =
"sb_publishable_7sa_ZhaXVYbm1Rt4ZRuzqg_3Z9DfKJz";


const db = supabase.createClient(
supabaseUrl,
supabaseKey
);



async function saveScore(score){


let name = localStorage.getItem("playerName");


if(!name){

name = prompt("名前を入力してください");


if(!name){

name="名無し";

}


localStorage.setItem(
"playerName",
name
);

}



const {error}=await db
.from("ranking")
.insert([
{
name:name,
score:score
}
]);


if(error){

console.log(error);

}


loadRanking();


}



async function loadRanking(){


const {data,error}=await db
.from("ranking")
.select("*")
.order("score",{ascending:false})
.limit(10);



if(error){

console.log(error);

return;

}



let list=document.getElementById("ranking");


list.innerHTML="";



data.forEach((player,index)=>{


let li=document.createElement("li");


li.textContent =
(index+1)+"位 "+player.name+" : "+player.score;


list.appendChild(li);


});


}



loadRanking();


</script>
